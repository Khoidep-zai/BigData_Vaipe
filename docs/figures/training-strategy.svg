<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">THUOC Training Strategy</title>
  <desc id="desc">Two phase training with regularization and evaluation checkpoints.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ec"/>
      <stop offset="100%" stop-color="#f2f8ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#49526a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="url(#bg)"/>
  <text x="640" y="64" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#25354d">Training and Evaluation Strategy</text>
  <text x="640" y="100" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#30486a">Practical optimization settings for robust pill classification</text>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#1f2f45" stroke="#8aa0bc" stroke-width="1.8">
    <rect x="90" y="170" rx="20" ry="20" width="350" height="174" fill="#ffffff"/>
    <text x="265" y="220" text-anchor="middle" font-size="27" font-weight="700" fill="#2b4360">Phase 1</text>
    <text x="265" y="252" text-anchor="middle" font-size="17">Freeze backbone</text>
    <text x="265" y="278" text-anchor="middle" font-size="17">Train classifier head</text>
    <text x="265" y="304" text-anchor="middle" font-size="17">Warmup learning rate</text>

    <rect x="465" y="170" rx="20" ry="20" width="350" height="174" fill="#ffffff"/>
    <text x="640" y="220" text-anchor="middle" font-size="27" font-weight="700" fill="#2b4360">Phase 2</text>
    <text x="640" y="252" text-anchor="middle" font-size="17">Unfreeze full network</text>
    <text x="640" y="278" text-anchor="middle" font-size="17">Fine tuning with AdamW</text>
    <text x="640" y="304" text-anchor="middle" font-size="17">ReduceLROnPlateau</text>

    <rect x="840" y="170" rx="20" ry="20" width="350" height="174" fill="#ffffff"/>
    <text x="1015" y="220" text-anchor="middle" font-size="27" font-weight="700" fill="#2b4360">Validation</text>
    <text x="1015" y="252" text-anchor="middle" font-size="17">Early stopping</text>
    <text x="1015" y="278" text-anchor="middle" font-size="17">Best checkpoint save</text>
    <text x="1015" y="304" text-anchor="middle" font-size="17">Class mapping safety</text>
  </g>

  <g stroke="#49526a" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="440" y1="256" x2="465" y2="256"/>
    <line x1="815" y1="256" x2="840" y2="256"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#213246">
    <rect x="90" y="404" rx="18" ry="18" width="520" height="290" fill="#f8fbff" stroke="#9ab0c9"/>
    <text x="350" y="448" text-anchor="middle" font-size="27" font-weight="700">Regularization Stack</text>
    <text x="130" y="494" font-size="20">• Label smoothing (0.15 to 0.20)</text>
    <text x="130" y="532" font-size="20">• Mixup alpha (0.33 to 0.42)</text>
    <text x="130" y="570" font-size="20">• Dropout in classifier heads</text>
    <text x="130" y="608" font-size="20">• Gradient clipping for stability</text>
    <text x="130" y="646" font-size="20">• EMA for smoother evaluation</text>

    <rect x="670" y="404" rx="18" ry="18" width="520" height="290" fill="#f8fff8" stroke="#8fb79a"/>
    <text x="930" y="448" text-anchor="middle" font-size="27" font-weight="700">Evaluation Outputs</text>
    <text x="710" y="494" font-size="20">• Accuracy, Macro-F1, per model table</text>
    <text x="710" y="532" font-size="20">• Evaluation comparison chart (PNG)</text>
    <text x="710" y="570" font-size="20">• Confusion matrix per model and ensemble</text>
    <text x="710" y="608" font-size="20">• JSON summary for deployment apps</text>
    <text x="710" y="646" font-size="20">• Optional compare-only reproducible mode</text>
  </g>
</svg>
